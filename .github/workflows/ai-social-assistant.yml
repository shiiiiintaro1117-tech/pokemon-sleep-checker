name: AI Social Assistant (pokesleep)

on:
  schedule:
    # 月曜 07:00 JST = 日曜 22:00 UTC
    - cron: "0 22 * * 0"
    # 水曜 21:00 JST = 水曜 12:00 UTC
    - cron: "0 12 * * 3"
    # 土曜 07:00 JST = 金曜 22:00 UTC
    - cron: "0 22 * * 5"
  workflow_dispatch:
    inputs:
      force:
        description: "スケジュール外でも強制実行"
        required: false
        default: "false"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: AI投稿案を生成・Discord通知
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          node scripts/social-assistant/ai-assistant.mjs --discord $FORCE_FLAG
