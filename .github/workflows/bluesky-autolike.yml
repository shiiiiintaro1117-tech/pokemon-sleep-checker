name: Bluesky Auto Like

on:
  schedule:
    # UTC時間で指定（日本時間 = UTC+9）
    - cron: "0 22 * * *"  # 日本時間 07:00
    - cron: "0 3 * * *"   # 日本時間 12:00
    - cron: "0 12 * * *"  # 日本時間 21:00
  # 手動実行ボタン（テスト用）
  workflow_dispatch:

jobs:
  autolike:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/bluesky-autolike/package-lock.json

      - name: 依存パッケージをインストール
        working-directory: scripts/bluesky-autolike
        run: npm ci

      - name: 自動いいねを実行
        working-directory: scripts/bluesky-autolike
        env:
          BSKY_IDENTIFIER: ${{ secrets.BSKY_IDENTIFIER }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: node index.js
