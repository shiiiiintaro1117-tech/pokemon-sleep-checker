name: Social Assistant Report (pedalangler)

on:
  # 旧スクリプト。AI版 (ai-social-assistant-pedalangler.yml) に移行済み。
  # 手動実行のみ残す
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: レポート生成・Discord通知
        working-directory: .
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.PEDALANGLER_DISCORD_WEBHOOK_URL }}
          BSKY_IDENTIFIER: ${{ secrets.PEDALANGLER_BSKY_IDENTIFIER }}
          BSKY_APP_PASSWORD: ${{ secrets.PEDALANGLER_BSKY_APP_PASSWORD }}
        run: node scripts/social-assistant/index.mjs --config scripts/social-assistant/pedalangler.config.json --discord
